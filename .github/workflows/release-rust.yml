name: Release (Rust)

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      LIBTORCH_VERSION: "2.7.0"
      LIBTORCH_BYPASS_VERSION_CHECK: "1"

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y cmake pkg-config \
            nasm libclang-dev

      - name: Build static lame
        run: |
          curl -L -o lame-3.100.tar.gz \
            'https://sourceforge.net/projects/lame/files/lame/3.100/lame-3.100.tar.gz/download'
          tar xzf lame-3.100.tar.gz
          cd lame-3.100
          ./configure --prefix=/usr --libdir=/usr/lib/x86_64-linux-gnu \
            --enable-static --disable-shared --enable-nasm --disable-frontend
          make -j$(nproc)
          sudo make install

      - name: Build static opus
        run: |
          curl -LO https://downloads.xiph.org/releases/opus/opus-1.5.2.tar.gz
          tar xzf opus-1.5.2.tar.gz
          cd opus-1.5.2
          ./configure --prefix=/usr --libdir=/usr/lib/x86_64-linux-gnu \
            --enable-static --disable-shared
          make -j$(nproc)
          sudo make install

      - name: Verify static libraries
        run: |
          echo "=== Verify lame ==="
          ls -la /usr/lib/x86_64-linux-gnu/libmp3lame* || echo "lame .a not found!"
          ls -la /usr/include/lame/ || echo "lame headers not found!"
          echo "=== Verify opus ==="
          ls -la /usr/lib/x86_64-linux-gnu/libopus* || echo "opus .a not found!"
          ls -la /usr/lib/x86_64-linux-gnu/pkgconfig/opus.pc || echo "opus.pc not found!"
          echo "=== pkg-config default search path ==="
          pkg-config --variable pc_path pkg-config
          echo "=== pkg-config test ==="
          pkg-config --libs --cflags opus
          echo "=== No shared libs ==="
          ! ls /usr/lib/x86_64-linux-gnu/libmp3lame*.so* 2>/dev/null && echo "PASS: no lame .so"
          ! ls /usr/lib/x86_64-linux-gnu/libopus*.so* 2>/dev/null && echo "PASS: no opus .so"

      - name: Cache libtorch
        id: cache-libtorch
        uses: actions/cache@v4
        with:
          path: libtorch
          key: libtorch-cpu-${{ env.LIBTORCH_VERSION }}

      - name: Download libtorch
        if: steps.cache-libtorch.outputs.cache-hit != 'true'
        run: |
          wget -q "https://download.pytorch.org/libtorch/cpu/libtorch-cxx11-abi-shared-with-deps-${LIBTORCH_VERSION}%2Bcpu.zip" -O libtorch.zip
          unzip -q libtorch.zip
          rm libtorch.zip

      - name: Set libtorch environment
        run: |
          echo "LIBTORCH=$(pwd)/libtorch" >> $GITHUB_ENV
          echo "LD_LIBRARY_PATH=$(pwd)/libtorch/lib:$LD_LIBRARY_PATH" >> $GITHUB_ENV

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: cargo-release-linux-v5-${{ hashFiles('rust/Cargo.toml') }}
          restore-keys: cargo-release-linux-v5-

      - name: Build
        working-directory: rust
        run: cargo build --release

      - name: Verify no dynamic lame/opus dependency
        run: |
          echo "=== Shared library dependencies ==="
          ldd rust/target/release/qwen3-audio-api
          if ldd rust/target/release/qwen3-audio-api | grep -qE 'libmp3lame|libopus'; then
            echo "FAIL: binary dynamically links to lame or opus"
            exit 1
          fi
          echo "PASS: lame and opus are statically linked"

      - name: Package archive
        run: |
          mkdir -p staging/qwen3-audio-api-linux-x86_64
          cp rust/target/release/qwen3-audio-api staging/qwen3-audio-api-linux-x86_64/
          cp -r libtorch staging/qwen3-audio-api-linux-x86_64/
          tar -czf qwen3-audio-api-linux-x86_64.tar.gz -C staging qwen3-audio-api-linux-x86_64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64
          path: qwen3-audio-api-linux-x86_64.tar.gz

  build-macos:
    runs-on: macos-14
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: brew install cmake pkg-config nasm

      - name: Build static lame
        run: |
          curl -L -o lame-3.100.tar.gz \
            'https://sourceforge.net/projects/lame/files/lame/3.100/lame-3.100.tar.gz/download'
          tar xzf lame-3.100.tar.gz
          cd lame-3.100
          ./configure --prefix=/opt/homebrew --enable-static --disable-shared \
            --disable-frontend
          make -j$(sysctl -n hw.ncpu)
          make install

      - name: Build static opus
        run: |
          curl -LO https://downloads.xiph.org/releases/opus/opus-1.5.2.tar.gz
          tar xzf opus-1.5.2.tar.gz
          cd opus-1.5.2
          ./configure --prefix=/opt/homebrew --enable-static --disable-shared
          make -j$(sysctl -n hw.ncpu)
          make install

      - name: Verify static libraries
        run: |
          echo "=== Verify lame ==="
          ls -la /opt/homebrew/lib/libmp3lame* || echo "lame .a not found!"
          echo "=== Verify opus ==="
          ls -la /opt/homebrew/lib/libopus* || echo "opus .a not found!"
          ls -la /opt/homebrew/lib/pkgconfig/opus.pc || echo "opus.pc not found!"
          echo "=== pkg-config default search path ==="
          pkg-config --variable pc_path pkg-config
          echo "=== pkg-config test ==="
          pkg-config --libs --cflags opus
          echo "=== No shared libs ==="
          ! ls /opt/homebrew/lib/libmp3lame*.dylib 2>/dev/null && echo "PASS: no lame .dylib"
          ! ls /opt/homebrew/lib/libopus*.dylib 2>/dev/null && echo "PASS: no opus .dylib"

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: cargo-release-macos-arm64-v5-${{ hashFiles('rust/Cargo.toml') }}
          restore-keys: cargo-release-macos-arm64-v5-

      - name: Build with MLX backend
        working-directory: rust
        env:
          CFLAGS: "-I/opt/homebrew/include"
          LDFLAGS: "-L/opt/homebrew/lib"
        run: cargo build --release --no-default-features --features "mlx build-ffmpeg"

      - name: Verify no dynamic lame/opus dependency
        run: |
          echo "=== Shared library dependencies ==="
          otool -L rust/target/release/qwen3-audio-api
          if otool -L rust/target/release/qwen3-audio-api | grep -qE 'libmp3lame|libopus'; then
            echo "FAIL: binary dynamically links to lame or opus"
            exit 1
          fi
          echo "PASS: lame and opus are statically linked"

      - name: Package archive
        run: |
          METALLIB=$(find rust/target/release/build -path '*/qwen3_tts-*/out/lib/mlx.metallib' | head -1)
          if [ -z "$METALLIB" ]; then
            echo "ERROR: mlx.metallib not found in build artifacts"
            exit 1
          fi
          echo "Found metallib at: $METALLIB ($(stat -f%z "$METALLIB") bytes)"
          mkdir -p staging/qwen3-audio-api-macos-arm64
          cp rust/target/release/qwen3-audio-api staging/qwen3-audio-api-macos-arm64/
          cp "$METALLIB" staging/qwen3-audio-api-macos-arm64/
          tar -czf qwen3-audio-api-macos-arm64.tar.gz -C staging qwen3-audio-api-macos-arm64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: qwen3-audio-api-macos-arm64.tar.gz

  release:
    needs: [build-linux, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-x86_64

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-arm64

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            qwen3-audio-api-linux-x86_64.tar.gz
            qwen3-audio-api-macos-arm64.tar.gz
